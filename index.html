<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор доходности</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
    <script src="main.js" defer></script>
</head>

<body>
    <header class="header">
        <div class="main-layout">
            <div class="main-layout__left">
                <div class="header__container">
                    <div class="header__img-wrapper">
                        <img src="images/logo.svg" alt="" class="header__logo">
                    </div>
                    <h1 class="header__title">Калькулятор доходности</h1>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="main-layout">
            <div class="main-layout__left">
                <div class="container main__container">

                    <div class="calc__row">
                        <div class="calc__field">
                            <label class="calc__label">Тип депозита</label>
                            <select class="calc__select" id="deposit-type">
                                <option value="standart">Standart</option>
                                <option value="standart-plus">Standart+</option>
                                <option value="vip">VIP</option>
                            </select>
                        </div>

                        <div class="calc__currencies" id="currency-selector">
                            <button class="currency-btn active">BTC</button>
                            <button class="currency-btn">UAH</button>
                            <button class="currency-btn">RUB</button>
                            <button class="currency-btn">EUR</button>
                            <button class="currency-btn">USD</button>
                        </div>
                    </div>

                    <div class="calc__row calc__row--range">
                        <div class="calc__field">
                            <label class="calc__label">Сумма инвестиций</label>
                            <div class="range-container">
                                <input type="range" class="calc__slider yellow-slider" id="slider-amount" min="100" max="100000"
                                    value="10000">
                                <div class="calc__input-block">
                                    <input type="text" class="calc__input-value" id="input-amount" value="10000">
                                    <span class="calc__input-currency">BTC</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="calc__row calc__row--range">
                        <div class="calc__field">
                            <label class="calc__label">Срок инвестиций (Месяцев)</label>
                            <div class="range-container">
                                <div class="slider__wrapper">
                                    <input type="range" class="calc__slider yellow-slider" id="slider-period" min="1" max="12"
                                        value="2">
                                    <div class="calc__steps">
                                        <span>1</span><span class="active-step">2</span><span>3</span><span>4</span>
                                        <span>5</span><span>6</span><span>7</span><span>8</span>
                                        <span>9</span><span>10</span><span>11</span><span>12</span>
                                    </div>
                                </div>
                                <div class="calc__percents">
                                    <p class="calc__percent">Процентная ставка</p>
                                    <p class="calc__number"><strong id="percent-rate">0.75%</strong> в день</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="calc__row calc__row--date">
                        <div class="calc__field calc__field--date">
                            <label class="calc__label">Старт инвестиции</label>
                            <input type="text" class="calc__input-value calc__input--date" id="date-start"
                                value="10 Апреля 2026">
                        </div>
                        <div class="calc__field calc__field--date">
                            <label class="calc__label">Завершение инвестиции</label>
                            <input type="text" class="calc__input-value calc__input--date" id="date-end"
                                value="10 Июня 2026">
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-layout__right">
                <div class="card-result">
                    <div class="result__stats">
                        <div class="stat-item">
                            <span class="stat-item__label">Инвестировали</span>
                            <span class="stat-item__value" id="res-invested">10,000 BTC</span>
                            <div class="stat-item__box stat-item__box--white"></div>
                        </div>

                        <div class="stat-item stat-item--main">
                            <span class="stat-item__label">Получаете</span>
                            <span class="stat-item__value" id="res-total">19,150 BTC</span>
                            <div class="stat-item__box stat-item__box--combined">
                                <div class="box-yellow"></div>
                                <div class="box-white"></div>
                            </div>
                        </div>
                    </div>
                    <div class="result__details">
                        <div class="detail-row">
                            <span>Инвестиция</span>
                            <strong id="detail-base">10,000 BTC</strong>
                        </div>
                        <div class="detail-row">
                            <span>Процент прибыли</span>
                            <strong id="detail-percent">91.5 %</strong>
                        </div>

                        <hr class="detail-divider">

                        <div class="detail-row detail-row--total">
                            <span>Прибыль с инвестиции</span>
                            <strong id="res-profit">9,150 BTC</strong>
                        </div>
                    </div>
                    <button class="btn-invest">ИНВЕСТИРОВАТЬ СЕЙЧАС</button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
